name: Release Obsidian plugin with attestations

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Install cosign (sigstore)
        run: |
          curl -L https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/cosign

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Sign artifacts with cosign (keyless)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          artifacts="main.js manifest.json styles.css"
          for f in $artifacts; do
            if [ -f "$f" ]; then
              echo "Signing $f"
              cosign sign-blob --keyless --output-signature "$f.sig" "$f"
            else
              echo "Warning: $f not found, skipping"
            fi
          done

      - name: Create draft release and upload assets (including signatures)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css main.js.sig manifest.json.sig styles.css.sig
